<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- WCKD stamp. Drawn as paths, not text: a favicon cannot rely on a font. -->
  <rect width="32" height="32" fill="#0B0E0F"/>
  <rect x="0.5" y="0.5" width="31" height="31" fill="none" stroke="#2E3436"/>

  <!-- W -->
  <path d="M6 8 L10 21 L16 12 L22 21 L26 8"
        fill="none" stroke="#E8EDF0" stroke-width="3"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- The one red WCKD ever uses. -->
  <rect x="10" y="25" width="12" height="2.5" fill="#C4382B"/>
</svg>
