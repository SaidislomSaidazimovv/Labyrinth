name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# A second push to the same branch cancels the first — no point checking a commit
# that is already superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b --pretty false

      - name: Build
        run: npm run build
