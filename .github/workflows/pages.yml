name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Don't cancel one mid-flight — a half-published site is
# worse than a stale one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No configure-pages step. Its `enablement: true` needs admin rights that
      # GITHUB_TOKEN does not have, and it fails the whole build when Pages is
      # off. Turning Pages on is a one-time manual step:
      #   Settings → Pages → Build and deployment → Source: GitHub Actions
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: SPA fallback
        # Pages has no rewrite rules. Serving index.html for a 404 lets
        # react-router resolve any deep link the client asks for.
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
